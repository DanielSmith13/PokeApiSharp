name: .NET CI/CD

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal

    - name: Clear local NuGet caches
      run: dotnet nuget locals all --clear

    - name: Pack (create .nupkg and .snupkg)
      run: |
        if [ "${{ github.ref_type }}" == "tag" ]; then
          # Remove 'v' prefix if it exists
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
        else
          # Read package <Version> from the project file and append preview suffix
          BASE_VERSION=$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' src/PokeApiSharp/PokeApiSharp.csproj | head -n1)
          if [ -n "$BASE_VERSION" ]; then
            VERSION="${BASE_VERSION}--preview.${{ github.run_number }}"
          else
            VERSION="0.0.1-preview.${{ github.run_number }}"
          fi
        fi
        dotnet pack src/PokeApiSharp/PokeApiSharp.csproj --configuration Release --no-build --output ./nupkg /p:PackageVersion=$VERSION /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg

    - name: Upload nupkg artifact
      uses: actions/upload-artifact@v7
      with:
        name: nupkgs
        path: ./nupkg

  publish:
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Download nupkg artifact
      uses: actions/download-artifact@v8
      with:
        name: nupkgs
        path: ./nupkg

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Publish to NuGet
      if: github.ref_type == 'tag'
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      run: |
        echo "Found packages:"
        ls -la ./nupkg || true
        for pkg in ./nupkg/*.nupkg; do
          if [ -f "$pkg" ]; then
            dotnet nuget push "$pkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          else
            echo "No package matched $pkg"
          fi
        done
